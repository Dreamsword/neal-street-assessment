name: CI/CD Pipeline

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Prevent overlapping runs per environment
concurrency:
  group: deploy-dev
  cancel-in-progress: false

env:
  TF_DIR: terraform
  AWS_REGION: eu-west-1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pull-requests: write  # For posting plan output on PRs

jobs:
  # -----------------------------------------------------------------------
  # Static checks — run on every PR and push
  # -----------------------------------------------------------------------
  lint:
    name: Lint & Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9"

      - name: Terraform Format Check
        working-directory: ${{ env.TF_DIR }}
        run: terraform fmt -check -recursive

      - name: Terraform Init (no backend)
        working-directory: ${{ env.TF_DIR }}
        run: terraform init -backend=false

      - name: Terraform Validate
        working-directory: ${{ env.TF_DIR }}
        run: terraform validate

      - name: Ansible Lint
        run: |
          pip install ansible-lint
          ansible-lint ansible/site.yml || true  # advisory, don't block

  # -----------------------------------------------------------------------
  # Plan — only on PRs, shows what Terraform would change
  # -----------------------------------------------------------------------
  plan:
    name: Terraform Plan (dev)
    runs-on: ubuntu-latest
    needs: lint
    if: github.event_name == 'pull_request'
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: terraform init -backend-config=environments/dev/backend.hcl

      - name: Terraform Plan
        working-directory: ${{ env.TF_DIR }}
        run: terraform plan -var-file=environments/dev/dev.tfvars -no-color -out=plan.tfplan
        continue-on-error: true

      - name: Post Plan to PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');
            let plan = '';
            try {
              plan = execSync('cd ${{ env.TF_DIR }} && terraform show -no-color plan.tfplan').toString();
            } catch (e) {
              plan = 'Plan failed — check the workflow logs.';
            }
            const body = `### Terraform Plan (dev)\n\`\`\`\n${plan.substring(0, 60000)}\n\`\`\``;
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });

  # -----------------------------------------------------------------------
  # Deploy — only on merge to main
  # -----------------------------------------------------------------------
  deploy:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    needs: lint
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: terraform init -backend-config=environments/dev/backend.hcl

      - name: Terraform Apply
        working-directory: ${{ env.TF_DIR }}
        run: terraform apply -var-file=environments/dev/dev.tfvars -auto-approve

      - name: Get EC2 IP from Terraform
        working-directory: ${{ env.TF_DIR }}
        id: tf_output
        run: |
          echo "ec2_ip=$(terraform output -raw ec2_private_ip)" >> "$GITHUB_OUTPUT"
          echo "instance_id=$(terraform output -raw ec2_instance_id)" >> "$GITHUB_OUTPUT"

      - name: Setup Python & Ansible
        run: |
          pip install ansible boto3

      - name: Run Ansible Playbook
        working-directory: ansible
        env:
          GIT_COMMIT: ${{ github.sha }}
          ANSIBLE_HOST_KEY_CHECKING: "False"
        run: |
          ansible-playbook site.yml \
            -e "ansible_host=${{ steps.tf_output.outputs.ec2_ip }}" \
            -e "environment=dev" \
            -e "project=rewards" \
            -e "aws_region=${{ env.AWS_REGION }}"
