[defaults]
inventory = inventory/hosts.yml
roles_path = roles
host_key_checking = False
remote_user = ec2-user
# private_key_file is intentionally not set here.
# In CI: passed via ANSIBLE_PRIVATE_KEY_FILE env var or --private-key flag.
# Locally: set ANSIBLE_PRIVATE_KEY_FILE=~/.ssh/your-key.pem before running.
retry_files_enabled = False

[privilege_escalation]
become = True
become_method = sudo
