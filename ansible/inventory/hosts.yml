# Inventory for the dev environment.
# In CI, this would be dynamically populated from Terraform outputs
# or use the aws_ec2 dynamic inventory plugin.
# For local testing, replace the IP with the EC2 private IP from Terraform output.
all:
  children:
    web:
      hosts:
        web-01:
          # In CI, WEB_HOST is set from Terraform output and passed via
          # the ANSIBLE_HOST env var or overridden with -e ansible_host=<ip>.
          # For local use, replace with the actual EC2 private IP.
          ansible_host: "REPLACE_WITH_EC2_IP"
      vars:
        environment: dev
        project: rewards
        aws_region: eu-west-1
