---
- name: Install nginx
  ansible.builtin.dnf:
    name: nginx
    state: present

- name: Create health check response file
  ansible.builtin.template:
    src: health.json.j2
    dest: /usr/share/nginx/html/health.json
    owner: nginx
    group: nginx
    mode: "0644"
  notify: Reload nginx

- name: Deploy nginx config
  ansible.builtin.template:
    src: nginx.conf.j2
    dest: /etc/nginx/nginx.conf
    owner: root
    group: root
    mode: "0644"
    validate: nginx -t -c %s
  notify: Reload nginx

- name: Enable and start nginx
  ansible.builtin.systemd:
    name: nginx
    state: started
    enabled: true
